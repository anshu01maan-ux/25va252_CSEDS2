<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function is JS</title>
</head>
<body>
    <script>
        //Function:a function is a reusable block of code designed to perform a specific task
        //normal functon without parameter
        function demo()
        {
            console.log("Hello JS");
        }
        demo();
        //normal functon with parameter
        function demo1(text)
        {
            console.log("Hello"+ text);
        }
        demo1("JS");
        let cal=function(){
            var num1=5;
            var num2=10;
            var res=num1*num2;
            console.log("multiply of num1 and num2 "+res);
        }
        cal();
        //arrow function
        //Arrow functions were introduced in ECMAScript 2015 (ES6) as a concise way to write function expressions. 
        // They use the => ("fat arrow") syntax and are particularly useful for short functions and callbacks 
        // due to their shorter syntax and how they handle the this keyword. 
        let div=(x,y)=>{
            var num1=x;
            var num2=y;
            var res=x/y;
            console.log("Division is "+res);
        }    
        div(12,3);
        //arrow function with single line statement
        let msg=()=>console.log("Hello ABES");
        msg();
        //A callback function in JavaScript is a function that is passed as an argument to another function, 
        // to be executed (or "called back") at a later point in time by the receiving function.
        function sub(callback){
            var num1=10;
            var num2=20;
            var res=num1-num2;
            //callback(res);
        }
        function displayRes(res)
        {
            console.log("Result is "+res);
        }
        sub(displayRes);
        //callback using setTimeout API
        function msg1(){
            console.log("Hello friend");
        }
        setTimeout(msg1,2000);
        //IIFE-
        (function(a,b){
            console.log(`First Parameter ${a} and Second Parameter ${b}`);
            var res=a+b;
            console.log(`Result is ${res}`);
        })(4,5);
        //short code using arrow function
        (msg=>console.log("Hello IIFE"))();

        //Promises:A Promise is an object representing the eventual result of an asynchronous operation.
        let promise=new Promise(function(resolve,reject){
            let age=25;
            if(age>=18){
                resolve("Valid Age");}
                else{
                    reject("wait for next year");
            }
        });
        //console.log(promise);
        promise
        .then(msg=>console.log(msg))
        .catch(error=>console.log(error));

        //async await........the async and await keywords are modern syntax (introduced in ES2017)
        //  that enable writing asynchronous code in a style that looks and reads like synchronous code       
        async function userData() {
            let response=await fetch('https://dummyjson.com/products/5');
            let responseData=await response.json();
            console.log(responseData);
            document.writeln(responseData);
            
        }
        userData();
        //error handling using try catch
        let myInfo={
            name:"John",
            age:"23",
            mob:2358741589,
            eMail:"john456@gmail.com"
        }
        //convert the object into JSON String
        let myInfoData=JSON.stringify(myInfo);

        //set data
        localStorage.setItem('preference',myInfoData);
        // Retreiving and parsing the object back
        let getMyInfoData=localStorage.getItem('preference');
        //parse the object
        const finalData=JSON.parse(getMyMyInfoData);
        console.log(finalData.name);

        /** Higher Order Function:-
         map() filter() reduce()
        //  A higher-order function in JavaScript is a function that does at least one of the following: 
       // Takes one or more functions as arguments (these are often called callback functions).
        //Returns a function as its resultforEach()
        map(): Transforms data by creating a new array from the results of a function.
        filter(): Creates a new array with elements that pass a test.
        reduce(): Aggregates array data into a single value.
        forEach(): Executes a function for each element, often for side effects.
        some() and every(): Check if elements meet specific conditions.**/
        

        </script>
</body>
</html>
