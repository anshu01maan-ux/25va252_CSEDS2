<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Value Types in JS</title>
</head>
<body>
    <script>
        //Primitive : Single Value (immutable)
        //String / Number / Boolean / null / Undefined / Symbol / BigInt
        let name="Abhay";
        let age=23;
        let isMArried=false;
        let address=null;
        let education; 
        console.log(isMArried);
        console.log(typeof(isMArried));
        //BigInt
        let salary=BigInt(797658742987432);
        console.log(salary);
        //Symbol
        let name1=Symbol("Anshumaan");
        let name2=Symbol("Anshumaan");
        console.log(Symbol(name1==name2));

        //Non-Primitive/ Reference ? Object-Mutable values
        // Object / Array / Function
        //Object {}- An Object is collection of its keys and value
        let student={
            name:"Anshumaan",
            age:18,
            isMArried:false,
            address:{
                streetNo: 25,
                area: "Crossing",
                pincode: 258741,
                city: "Ghaziabad",
            },
            course:"B-Tech",
            branch:"CSE",
            year:2025,
            getInfo:function(){
                return "My Education is "+student.course+" "+student.branch+" and year is " +student.year;
            }
        };
        console.log(student);
        console.log(student.name+" "+ student.age+" "+ student.address.city);
        console.log(typeof(student));
        console.log(student.getInfo());
        //find object's property in object
        console.log('age' in student);
        //delete object's property in objects
        console.log(delete student.name);
        console.log(student);
        console.log('name' in student );
        
    </script>
</body>
</html>
